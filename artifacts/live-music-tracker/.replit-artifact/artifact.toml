kind = "web"
previewPath = "/"
title = "Live Music Tracker"
version = "1.0.0"
id = "artifacts/live-music-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18652

[services.development]
run = "pnpm --filter @workspace/live-music-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/live-music-tracker", "run", "build" ]
publicDir = "artifacts/live-music-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18652"
BASE_PATH = "/"
